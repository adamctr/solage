name: solage-dev

services:
  traefik:
    image: traefik:v3.1
    command:
      - --api.insecure=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
    ports:
      - "80:80"
      - "8080:8080"   # Traefik dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - solage

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    image: solage-app  # reuse the app image; no separate build cost
    command: ["php", "/app/bin/migrate.php"]
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-solage}
      DB_USER: ${DB_USER:-solage}
      DB_PASSWORD: ${DB_PASSWORD:-solage}
    volumes:
      - ./:/app
      - /app/vendor
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    networks:
      - solage

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: solage-app
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-solage}
      DB_USER: ${DB_USER:-solage}
      DB_PASSWORD: ${DB_PASSWORD:-solage}
    volumes:
      # Live code reload in dev. vendor/ comes from the image, but bind-mount
      # overrides it; we re-mount vendor as anonymous volume to keep the
      # composer-installed deps from the build stage.
      - ./:/app
      - /app/vendor
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    labels:
      - traefik.enable=true
      - traefik.http.routers.solage.rule=Host(`solage.localhost`) || Host(`localhost`) || Host(`127.0.0.1`)
      - traefik.http.routers.solage.entrypoints=web
      - traefik.http.services.solage.loadbalancer.server.port=80
    networks:
      - solage

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-solage}
      POSTGRES_USER: ${DB_USER:-solage}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-solage}
    ports:
      - "5432:5432"   # exposed for local tools (psql, TablePlus); not for Traefik
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./solage.pg.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-solage} -d ${DB_NAME:-solage}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - solage

volumes:
  postgres-data:

networks:
  solage:
    driver: bridge
