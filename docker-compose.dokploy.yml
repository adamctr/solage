name: solage

services:
  migrate:
    build: { context: ., dockerfile: Dockerfile }
    image: solage-app:prod
    command: ["php", "/app/bin/migrate.php"]
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:?DB_NAME is required}
      DB_USER: ${DB_USER:?DB_USER is required}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    networks:
      - solage

  app:
    build: { context: ., dockerfile: Dockerfile }
    image: solage-app:prod
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:?DB_NAME is required}
      DB_USER: ${DB_USER:?DB_USER is required}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    # Pas de service Traefik ici : c'est le Traefik de Dokploy qui termine le TLS.
    # Seul `app` rejoint `dokploy-network` pour être routé ; Postgres reste privé.
    labels:
      - traefik.enable=true
      - traefik.http.routers.solage.rule=Host(`${APP_DOMAIN:?APP_DOMAIN is required}`)
      - traefik.http.routers.solage.entrypoints=websecure
      - traefik.http.routers.solage.tls.certresolver=letsencrypt
      - traefik.http.services.solage.loadbalancer.server.port=80
    networks:
      - solage
      - dokploy-network

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:?DB_NAME is required}
      POSTGRES_USER: ${DB_USER:?DB_USER is required}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    # No `ports:` — Postgres is only reachable inside the `solage` network.
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./solage.pg.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks:
      - solage

volumes:
  postgres-data:

networks:
  solage:
    driver: bridge
  dokploy-network:
    external: true
